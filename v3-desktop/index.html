<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YC 提示词工具 v3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================== CSS Variables ==================== */
        :root {
            --bg: #f5f5f5;
            --bg-secondary: #ebebeb;
            --bg-card: #ffffff;
            --bg-hover: #f0f0f0;
            --text: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e0e0e0;
            --border-light: #eeeeee;
            --accent: #4a90d9;
            --accent-hover: #357abd;
            --accent-light: rgba(74, 144, 217, 0.1);
            --success: #52c41a;
            --warning: #faad14;
            --error: #f5222d;
            --radius: 8px;
            --radius-sm: 4px;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.15);
            --transition: all 0.2s ease;
        }
        
        [data-theme="dark"] {
            --bg: #1a1a1a;
            --bg-secondary: #252525;
            --bg-card: #2a2a2a;
            --bg-hover: #333333;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --border: #444444;
            --border-light: #3a3a3a;
            --accent: #5a9fd4;
            --accent-hover: #4a8fc4;
            --accent-light: rgba(90, 159, 212, 0.15);
        }
        
        /* ==================== Base Styles ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            font-size: 14px;
            line-height: 1.5;
        }
        
        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ==================== App Container ==================== */
        .app {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* ==================== Sidebar ==================== */
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i {
            font-size: 1.3rem;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .sidebar-section {
            margin-bottom: 24px;
        }
        
        .sidebar-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        .nav-item {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            margin-bottom: 2px;
            color: var(--text-secondary);
        }
        
        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        
        .nav-item.active {
            background: var(--accent);
            color: white;
        }
        
        .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .nav-count {
            margin-left: auto;
            font-size: 0.75rem;
            opacity: 0.7;
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .nav-item.active .nav-count {
            background: rgba(255,255,255,0.2);
        }
        
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        
        .sidebar-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }
        
        .sidebar-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
            border-color: var(--accent);
        }
        
        /* ==================== Main Content ==================== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }
        
        /* ==================== Titlebar ==================== */
        .titlebar {
            height: 40px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
            -webkit-app-region: drag;
            user-select: none;
        }
        
        .titlebar-drag-area {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }
        
        .titlebar-title {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .titlebar-actions {
            display: flex;
            -webkit-app-region: no-drag;
            height: 100%;
        }
        
        .titlebar-btn {
            width: 46px;
            height: 100%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 0.8rem;
        }
        
        .titlebar-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        
        .titlebar-btn.close:hover {
            background: var(--error);
            color: white;
        }
        
        /* ==================== Toolbar ==================== */
        .toolbar {
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        
        .toolbar-left {
            flex: 1;
            max-width: 400px;
        }
        
        .toolbar-right {
            display: flex;
            gap: 8px;
        }
        
        .search-box {
            position: relative;
            width: 100%;
        }
        
        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            transition: var(--transition);
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        
        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .search-shortcut {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            pointer-events: none;
        }
        
        /* ==================== Buttons ==================== */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            font-weight: 500;
            white-space: nowrap;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }
        
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .btn-ghost:hover {
            background: var(--bg-hover);
            color: var(--text);
            border-color: var(--text-muted);
        }
        
        .btn-danger {
            background: var(--error);
            color: white;
        }
        
        .btn-danger:hover {
            background: #d91f29;
        }
        
        /* ==================== Content Area ==================== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg);
        }
        
        /* ==================== Loading State ==================== */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 16px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ==================== Empty State ==================== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 16px;
            text-align: center;
        }
        
        .empty-state i {
            font-size: 4rem;
            opacity: 0.3;
        }
        
        .empty-state p {
            font-size: 1rem;
        }
        
        /* ==================== Prompt Grid ==================== */
        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        
        .prompt-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .prompt-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        
        .prompt-card.featured {
            border-left: 3px solid var(--warning);
        }
        
        .prompt-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        
        .prompt-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
            line-height: 1.4;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .prompt-actions {
            display: flex;
            gap: 4px;
        }
        
        .action-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 0.85rem;
        }
        
        .action-btn:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        
        .action-btn.active {
            color: var(--warning);
        }
        
        .action-btn.danger:hover {
            background: var(--error);
            color: white;
        }
        
        .prompt-content {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.5;
            flex: 1;
            min-height: 40px;
        }
        
        .prompt-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .prompt-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }
        
        .prompt-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .category-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 12px;
            font-weight: 500;
        }
        
        .category-badge i {
            font-size: 0.7rem;
        }
        
        .prompt-actions-row {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: var(--transition);
        }
        
        .prompt-card:hover .prompt-actions-row {
            opacity: 1;
        }
        
        /* ==================== Status Bar ==================== */
        .statusbar {
            height: 32px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .statusbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .statusbar .separator {
            opacity: 0.5;
        }
        
        /* ==================== Modal ==================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        
        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            animation: modal-in 0.2s ease;
        }
        
        @keyframes modal-in {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--text);
        }
        
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        /* ==================== Form Styles ==================== */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
        }
        
        .form-group .required {
            color: var(--error);
        }
        
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            transition: var(--transition);
            font-family: inherit;
        }
        
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .editor-wrapper {
            height: 300px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        
        /* ==================== Toast Notifications ==================== */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .toast {
            padding: 12px 16px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 0.9rem;
            box-shadow: var(--shadow-lg);
            animation: slide-in 0.3s ease;
        }
        
        .toast.success {
            background: var(--success);
        }
        
        .toast.error {
            background: var(--error);
        }
        
        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .toast-enter-active,
        .toast-leave-active {
            transition: all 0.3s ease;
        }
        
        .toast-enter-from,
        .toast-leave-to {
            opacity: 0;
            transform: translateX(100%);
        }
        
        /* ==================== Scrollbar ==================== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* ==================== Responsive ==================== */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            
            .prompt-grid {
                grid-template-columns: 1fr;
            }
            
            .toolbar {
                flex-direction: column;
                gap: 12px;
            }
            
            .toolbar-left {
                max-width: 100%;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .sidebar {
                display: none;
            }
            
            .modal {
                max-width: 100%;
                max-height: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
