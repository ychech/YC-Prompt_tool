<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YC 提示词工具 v3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f5f5f5;
            --bg-card: #ffffff;
            --text: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e0e0e0;
            --accent: #4a90d9;
            --accent-hover: #357abd;
            --success: #52c41a;
            --warning: #faad14;
            --error: #f5222d;
            --radius: 8px;
        }
        
        [data-theme="dark"] {
            --bg: #1a1a1a;
            --bg-card: #2a2a2a;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --border: #444444;
            --accent: #5a9fd4;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }
        
        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* App Container */
        .app {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .sidebar-section {
            margin-bottom: 24px;
        }
        
        .sidebar-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .nav-item {
            padding: 8px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            margin-bottom: 2px;
        }
        
        .nav-item:hover {
            background: var(--bg);
        }
        
        .nav-item.active {
            background: var(--accent);
            color: white;
        }
        
        .nav-item i {
            width: 20px;
            text-align: center;
        }
        
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Titlebar (for custom window controls) */
        .titlebar {
            height: 40px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            -webkit-app-region: drag;
        }
        
        .titlebar-actions {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }
        
        .titlebar-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        
        .titlebar-btn.close { background: #ff5f57; }
        .titlebar-btn.minimize { background: #febc2e; }
        .titlebar-btn.maximize { background: #28c840; }
        
        /* Toolbar */
        .toolbar {
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .search-box {
            position: relative;
            width: 280px;
        }
        
        .search-box input {
            width: 100%;
            padding: 6px 10px 6px 32px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
        }
        
        .search-box i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }
        
        .btn-ghost:hover {
            background: var(--bg);
        }
        
        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        
        .prompt-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .prompt-card:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .prompt-title {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        
        .prompt-content {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .prompt-meta {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Status Bar */
        .statusbar {
            height: 28px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app" data-theme="light">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="logo">
                        <i class="fas fa-feather-alt"></i>
                        YC 提示词工具 v3
                    </div>
                </div>
                <div class="sidebar-content">
                    <div class="sidebar-section">
                        <div class="sidebar-title">分类</div>
                        <div class="nav-item active">
                            <i class="fas fa-th-large"></i>
                            <span>全部</span>
                        </div>
                        <div class="nav-item">
                            <i class="fas fa-star"></i>
                            <span>精选</span>
                        </div>
                        <div class="nav-item">
                            <i class="fas fa-pen-nib"></i>
                            <span>写作</span>
                        </div>
                        <div class="nav-item">
                            <i class="fas fa-code"></i>
                            <span>编程</span>
                        </div>
                        <div class="nav-item">
                            <i class="fas fa-chart-pie"></i>
                            <span>分析</span>
                        </div>
                    </div>
                    
                    <div class="sidebar-section">
                        <div class="sidebar-title">标签</div>
                        <div class="nav-item">
                            <i class="fas fa-tag"></i>
                            <span>示例标签</span>
                        </div>
                    </div>
                </div>
            </aside>
            
            <!-- Main -->
            <main class="main">
                <!-- Titlebar -->
                <div class="titlebar">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">YC Prompt Tool v3.0.0</span>
                    <div class="titlebar-actions">
                        <button class="titlebar-btn minimize"></button>
                        <button class="titlebar-btn maximize"></button>
                        <button class="titlebar-btn close"></button>
                    </div>
                </div>
                
                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="搜索提示词...">
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-ghost">
                            <i class="fas fa-folder-open"></i> 打开
                        </button>
                        <button class="btn btn-ghost">
                            <i class="fas fa-save"></i> 保存
                        </button>
                        <button class="btn btn-primary">
                            <i class="fas fa-plus"></i> 新建
                        </button>
                    </div>
                </div>
                
                <!-- Content -->
                <div class="content">
                    <div class="prompt-grid">
                        <div class="prompt-card">
                            <div class="prompt-title">示例提示词</div>
                            <div class="prompt-content">这是一个示例提示词的内容，展示桌面版的界面效果...</div>
                            <div class="prompt-meta">
                                <span><i class="fas fa-folder"></i> 写作</span>
                                <span><i class="fas fa-clock"></i> 刚刚</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Status Bar -->
                <div class="statusbar">
                    <span>就绪</span>
                    <span>共 1 个提示词</span>
                </div>
            </main>
        </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
